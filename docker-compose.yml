services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-aet_hub_owner}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:?defina POSTGRES_SUPERUSER_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-aet_hub}
    ports:
      - '5432:5432'
    volumes:
      - aet_hub_postgres_data:/var/lib/postgresql/data
      - ./apps/api/prisma/roles.sql:/roles.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aet_hub_postgres_data:
